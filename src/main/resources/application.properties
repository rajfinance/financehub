spring.application.name=FinanceHub
server.port=${PORT:8080}

# Startup: skip JMX agent registration (saves time on Windows); disable open-in-view (no view-layer queries)
spring.jmx.enabled=false
spring.jpa.open-in-view=false

# Required: set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
# (Render / IntelliJ env, or -Dspring.datasource.*). Without a URL, JPA cannot start.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

management.endpoints.web.exposure.include=health
server.servlet.session.tracking-modes=cookie

logging.level.root=INFO

spring.web.encoding.charset=UTF-8
spring.web.encoding.enabled=true
spring.web.encoding.force=true

# Profile photo upload (compressed JPEG stored in DB; see ProfilePhotoProcessor)
spring.servlet.multipart.max-file-size=512KB
spring.servlet.multipart.max-request-size=512KB

# Category icons and other files on disk (override in prod to a persistent path)
fh.uploads.root=uploads
