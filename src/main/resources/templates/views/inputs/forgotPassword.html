<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password - RajaFinanceHub</title>
</head>
<body>
<div th:replace="~{views/common/header :: header(true)}"></div>

<div class="login-page">
    <main class="login-container">
        <div class="login-form">
            <h1>Reset password</h1>
            <p class="auth-hint">Enter your username and the email on your account. Both must match to continue.</p>

            <div th:if="${error != null}" class="form-alert form-alert--error" th:text="${error}"></div>
            <div th:if="${success != null}" class="form-alert form-alert--success" th:text="${success}"></div>

            <form th:action="@{/api/password-reset/request}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="input-group">
                    <label for="username">Username<span class="req-mark" aria-hidden="true">*</span></label>
                    <input type="text" id="username" name="username" required="required" autocomplete="username"
                           placeholder="Your username"/>
                </div>
                <div class="input-group">
                    <label for="email">Email<span class="req-mark" aria-hidden="true">*</span></label>
                    <input type="email" id="email" name="email" required="required" autocomplete="email"
                           placeholder="Email on your account"/>
                </div>
                <button type="submit">Continue</button>
            </form>
            <div class="signup-link">
                <p><a th:href="@{/login}">Back to login</a></p>
            </div>
        </div>
    </main>
</div>
</body>
</html>
