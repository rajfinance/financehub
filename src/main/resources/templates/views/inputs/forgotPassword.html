<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RajaFinanceHub</title>
</head>
<body>
<div th:replace="~{common/header :: header}"></div>

<div class="login-page">
    <main class="login-container">
        <div class="login-form">
            <h1>Reset Password</h1>

            <div th:if="${error != null}" style="color: red; text-align: center; font-weight: bold;" th:text="${error}"></div>
            <div th:if="${success != null}" style="color: green; text-align: center; font-weight: bold;" th:text="${success}"></div>

            <form th:action="@{/api/resetPassword}" method="post" onsubmit="return validatePasswordResetForm()">
                <div class="input-group">
                    <label for="username">Username<span class="mandatory">*</span>:</label>
                    <input type="text" id="username" name="username" required="required" />
                </div>
                <div class="input-group">
                    <label for="password">Password<span class="mandatory">*</span>:</label>
                    <input type="password" id="password" name="password" required="required" />
                </div>
                <div class="input-group">
                    <label for="password">Password<span class="mandatory">*</span>:</label>
                    <input type="password" id="confirm_password" name="confirm_password" required="required" />
                </div>
                <button type="submit">Reset Password</button>
            </form>
        </div>
    </main>
</div>
</body>
</html>
