<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change password</title>
</head>
<body>
<div th:replace="~{views/common/header :: header}"></div>

<div class="login-page">
    <main class="login-container">
        <div class="login-form">
            <h1>Change password</h1>

            <div th:if="${error != null}" style="color: red; text-align: center; font-weight: bold;" th:text="${error}"></div>
            <div th:if="${success != null}" style="color: green; text-align: center; font-weight: bold;" th:text="${success}"></div>

            <form th:action="@{/api/account/change-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="input-group">
                    <label for="currentPassword">Current password:</label>
                    <input type="password" id="currentPassword" name="currentPassword" required="required" autocomplete="current-password"/>
                </div>
                <div class="input-group">
                    <label for="newPassword">New password:</label>
                    <input type="password" id="newPassword" name="newPassword" required="required" minlength="8" autocomplete="new-password"/>
                </div>
                <div class="input-group">
                    <label for="confirmPassword">Confirm new password:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required="required" minlength="8" autocomplete="new-password"/>
                </div>
                <button type="submit">Update</button>
            </form>
            <div class="signup-link">
                <p><a th:href="@{/api/home}">Back to home</a></p>
            </div>
        </div>
    </main>
</div>
</body>
</html>
