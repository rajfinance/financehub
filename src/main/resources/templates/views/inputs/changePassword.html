<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change password</title>
</head>
<body class="account-spa-shell">
<div th:replace="~{views/common/header :: header(true)}"></div>

<div class="main-content" id="mainContent">
    <div id="username" style="display: none;" sec:authentication="name"></div>
    <div id="page-content">
        <div class="login-page account-auth-page account-auth-page--embedded">
            <main class="login-container">
                <div class="login-form">
                    <h1>Change password</h1>

                    <div th:if="${error != null}" class="form-alert form-alert--error" th:text="${error}"></div>
                    <div th:if="${success != null}" class="form-alert form-alert--success" th:text="${success}"></div>

                    <form th:action="@{/api/account/change-password}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="input-group">
                            <label for="currentPassword">Current password<span class="req-mark" aria-hidden="true">*</span></label>
                            <input type="password" id="currentPassword" name="currentPassword" required="required" autocomplete="current-password"
                                   placeholder="Current password"/>
                        </div>
                        <div class="input-group">
                            <label for="newPassword">New password<span class="req-mark" aria-hidden="true">*</span></label>
                            <input type="password" id="newPassword" name="newPassword" required="required" minlength="8" autocomplete="new-password"
                                   placeholder="At least 8 characters"/>
                        </div>
                        <div class="input-group">
                            <label for="confirmPassword">Confirm new password<span class="req-mark" aria-hidden="true">*</span></label>
                            <input type="password" id="confirmPassword" name="confirmPassword" required="required" minlength="8" autocomplete="new-password"
                                   placeholder="Re-enter new password"/>
                        </div>
                        <button type="submit">Update</button>
                    </form>
                </div>
            </main>
        </div>
    </div>
</div>
</body>
</html>
