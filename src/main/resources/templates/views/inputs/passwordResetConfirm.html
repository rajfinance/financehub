<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New password - RajaFinanceHub</title>
</head>
<body>
<div th:replace="~{views/common/header :: header}"></div>

<div class="login-page">
    <main class="login-container">
        <div class="login-form">
            <h1>Set new password</h1>

            <div th:if="${error != null}" style="color: red; text-align: center; font-weight: bold;" th:text="${error}"></div>
            <div th:if="${success != null}" style="color: green; text-align: center; font-weight: bold;" th:text="${success}"></div>

            <form th:action="@{/api/password-reset/complete}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="input-group">
                    <label for="password">New password<span class="mandatory">*</span>:</label>
                    <input type="password" id="password" name="password" required="required" minlength="8" autocomplete="new-password"/>
                </div>
                <div class="input-group">
                    <label for="confirm_password">Confirm password<span class="mandatory">*</span>:</label>
                    <input type="password" id="confirm_password" name="confirm_password" required="required" minlength="8" autocomplete="new-password"/>
                </div>
                <button type="submit">Update password</button>
            </form>
        </div>
    </main>
</div>
</body>
</html>
