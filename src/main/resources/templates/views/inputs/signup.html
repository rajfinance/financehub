<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - RajaFinanceHub</title>
</head>
<body>
<div th:replace="~{views/common/header :: header(true)}"></div>

<div class="signup-body">
    <main class="signup" role="main">
        <form th:action="@{/api/perform_signup}" method="post" onsubmit="return validateForm(event)">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <h2>Create account</h2>

            <div th:if="${error != null}" class="form-alert form-alert--error" th:text="${error}"></div>

            <div th:if="${success != null}" class="form-alert form-alert--success">
                <span th:text="${success}"></span>
                <a th:href="@{/login}" href="/login">Go to Login</a>
            </div>

            <div class="signup-row">
                <div class="input-group">
                    <label for="username">Username<span class="req-mark" aria-hidden="true">*</span></label>
                    <input type="text" id="username" name="username" required="required" autocomplete="username"
                           placeholder="e.g. jsmith"
                           onchange="validUsername();"/>
                </div>
            </div>
            <div class="signup-row signup-row--cols-2">
                <div class="input-group">
                    <label for="email">Email<span class="req-mark" aria-hidden="true">*</span></label>
                    <input type="email" id="email" name="email" required="required" autocomplete="email"
                           placeholder="you@example.com"
                           onchange="validEmailId();"/>
                </div>
                <div class="input-group">
                    <label for="signupPhone">Phone<span class="req-mark" aria-hidden="true">*</span></label>
                    <input type="tel" id="signupPhone" name="phone" maxlength="32" required="required" autocomplete="tel"
                           placeholder="e.g. 9876543210"/>
                </div>
            </div>
            <div class="signup-row signup-row--cols-2">
                <div class="input-group">
                    <label for="password">Password<span class="req-mark" aria-hidden="true">*</span></label>
                    <input type="password" id="password" name="password" required="required" autocomplete="new-password"
                           placeholder="e.g. Str0ng#Pass"
                           onchange="validPassword();"/>
                </div>
                <div class="input-group">
                    <label for="confirmPassword">Confirm password<span class="req-mark" aria-hidden="true">*</span></label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required="required" autocomplete="new-password"
                           placeholder="Re-enter password"/>
                </div>
            </div>
            <button type="submit">Sign up</button>
        </form>
    </main>
</div>
</body>
</html>
