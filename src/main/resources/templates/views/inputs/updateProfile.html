<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update profile</title>
</head>
<body class="account-spa-shell account-update-profile">
<div th:replace="~{views/common/header :: header(true)}"></div>

<div class="main-content" id="mainContent">
    <div id="username" style="display: none;" sec:authentication="name"></div>
    <div id="page-content">
        <div class="fh-profile-update-shell">
            <main class="fh-profile-update-panel">
                <div class="fh-profile-update-form">
                    <h1>Update profile</h1>

                    <div class="profile-username-inline">
                        <span class="profile-username-label">Username</span>
                        <span class="fh-display-username profile-username-value" th:text="${displayUsername}">User</span>
                    </div>

                    <div th:if="${error != null}" class="form-alert form-alert--error" th:text="${error}"></div>
                    <div th:if="${success != null}" class="form-alert form-alert--success" th:text="${success}"></div>

                    <form th:action="@{/api/account/profile}" method="post" enctype="multipart/form-data" class="profile-update-fields">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="profile-form-row-2">
                            <div class="input-group">
                                <label for="email">Email<span class="req-mark" aria-hidden="true">*</span></label>
                                <input type="email" id="email" name="email" required="required" autocomplete="email"
                                       th:value="${email}" placeholder="you@example.com"/>
                            </div>
                            <div class="input-group">
                                <label for="phone">Phone<span class="req-mark" aria-hidden="true">*</span></label>
                                <input type="tel" id="phone" name="phone" maxlength="32" required="required" autocomplete="tel"
                                       th:value="${phone}" placeholder="e.g. 9876543210"/>
                            </div>
                        </div>

                        <div class="profile-photo-row">
                            <div class="input-group profile-photo-upload">
                                <label for="photo">Profile photo</label>
                                <input type="file" id="photo" name="photo"
                                       accept="image/jpeg,image/jpg,image/png,.jpg,.jpeg,.png"
                                       onchange="previewProfilePhoto(this)"/>
                                <p class="profile-file-hint">JPG, JPEG, or PNG — max 512 KB per file.</p>
                                <div class="profile-checkbox-row" th:if="${hasProfilePhoto}">
                                    <label for="removePhoto">
                                        <input type="checkbox" id="removePhoto" name="removePhoto" value="true"/>
                                        Remove current photo
                                    </label>
                                </div>
                            </div>
                            <div class="profile-photo-preview-wrap">
                                <span class="profile-readonly-label">Preview</span>
                                <img id="profilePhotoPreview" class="profile-photo-preview"
                                     th:with="pv=${profileAvatarVersion != null ? profileAvatarVersion : 0}"
                                     th:src="@{/account/profile-photo(v=${pv})}"
                                     th:attr="data-default-src=@{/account/profile-photo(v=${pv})}"
                                     alt="Profile preview"
                                     loading="eager"
                                     decoding="async"/>
                            </div>
                        </div>

                        <div class="form-actions-footer">
                            <button type="submit" class="fh-btn">Save</button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>
</div>
</body>
</html>
