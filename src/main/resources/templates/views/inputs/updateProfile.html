<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update profile</title>
</head>
<body class="account-spa-shell">
<div th:replace="~{views/common/header :: header(true)}"></div>

<div class="main-content" id="mainContent">
    <div id="username" style="display: none;" sec:authentication="name"></div>
    <div id="page-content">
        <div class="login-page account-auth-page account-auth-page--embedded">
            <main class="login-container login-container--profile">
                <div class="login-form">
                    <h1>Update profile</h1>
                    <p class="auth-hint">Update your email and phone. Photos are saved as compressed JPEG (typically under 48 KB).</p>

                    <div th:if="${error != null}" class="form-alert form-alert--error" th:text="${error}"></div>
                    <div th:if="${success != null}" class="form-alert form-alert--success" th:text="${success}"></div>

                    <div class="profile-readonly-block">
                        <div class="profile-readonly-row">
                            <span class="profile-readonly-label">Username</span>
                            <span th:text="${username}">user</span>
                        </div>
                    </div>

                    <div class="profile-photo-preview-wrap">
                        <span class="profile-readonly-label">Photo</span>
                        <img class="profile-photo-preview"
                             th:with="pv=${profileAvatarVersion != null ? profileAvatarVersion : 0}"
                             th:src="@{/account/profile-photo(v=${pv})}"
                             alt="Profile"
                             loading="eager"
                             decoding="async"/>
                    </div>

                    <form th:action="@{/api/account/profile}" method="post" enctype="multipart/form-data">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="input-group">
                            <label for="email">Email<span class="req-mark" aria-hidden="true">*</span></label>
                            <input type="email" id="email" name="email" required="required" autocomplete="email"
                                   th:value="${email}" placeholder="you@example.com"/>
                        </div>
                        <div class="input-group">
                            <label for="phone">Phone<span class="req-mark" aria-hidden="true">*</span></label>
                            <input type="tel" id="phone" name="phone" maxlength="32" required="required" autocomplete="tel"
                                   th:value="${phone}" placeholder="e.g. 9876543210"/>
                        </div>
                        <div class="input-group">
                            <label for="photo">New profile photo</label>
                            <input type="file" id="photo" name="photo" accept="image/jpeg,image/png,image/jpg"/>
                        </div>
                        <div class="input-group profile-checkbox-row" th:if="${hasProfilePhoto}">
                            <label for="removePhoto">
                                <input type="checkbox" id="removePhoto" name="removePhoto" value="true"/>
                                Remove current photo (use default avatar)
                            </label>
                        </div>
                        <button type="submit">Save</button>
                    </form>
                </div>
            </main>
        </div>
    </div>
</div>
</body>
</html>
