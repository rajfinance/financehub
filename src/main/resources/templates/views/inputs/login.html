<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RajaFinanceHub</title>
</head>
<body>
<div th:replace="~{views/common/header :: header}"></div>

<div class="login-page">
    <main class="login-container">
        <div class="login-form">
            <h1>Login</h1>

            <div th:if="${param.error != null}" style="color: red; text-align: center; font-weight: bold;">Invalid username or password.</div>
            <div th:if="${param.logout != null}" style="color: green; text-align: center; font-weight: bold;">You have been signed out.</div>
            <div th:if="${success != null}" style="color: green; text-align: center; font-weight: bold;" th:text="${success}"></div>

            <form th:action="@{/api/perform_login}" method="post" onsubmit="return validateLoginForm()">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="input-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required="required" autocomplete="username"/>
                </div>
                <div class="input-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required="required" autocomplete="current-password"/>
                </div>
                <button type="submit">Login</button>
            </form>
            <div class="signup-link">
                <p>Don't have an account? <a th:href="@{/signup}" href="/signup">Sign Up</a>
                    <a th:href="@{/forgotPassword}" href="/forgotPassword">Forgot password</a></p>
            </div>
        </div>
    </main>
</div>
</body>
</html>
