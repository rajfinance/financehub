<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RajaFinanceHub</title>
</head>
<body>
<div th:replace="~{views/common/header :: header(true)}"></div>

<div class="login-page">
    <main class="login-container">
        <div class="login-form">
            <h1>Sign in</h1>

            <div th:if="${param.error != null}" class="form-alert form-alert--error">Invalid username or password.</div>
            <div th:if="${param.logout != null}" class="form-alert form-alert--success">You have been signed out.</div>
            <div th:if="${success != null}" class="form-alert form-alert--success" th:text="${success}"></div>

            <form th:action="@{/api/perform_login}" method="post" onsubmit="return validateLoginForm()">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="input-group">
                    <label for="username">Username<span class="req-mark" aria-hidden="true">*</span></label>
                    <input type="text" id="username" name="username" required="required" autocomplete="username"
                           placeholder="Your username"/>
                </div>
                <div class="input-group">
                    <label for="password">Password<span class="req-mark" aria-hidden="true">*</span></label>
                    <input type="password" id="password" name="password" required="required" autocomplete="current-password"
                           placeholder="Your password"/>
                </div>
                <button type="submit">Login</button>
            </form>
            <div class="login-extras">
                <a th:href="@{/forgotPassword}" href="/forgotPassword" class="login-link-forgot">Forgot password?</a>
                <div class="login-signup-prompt">
                    <span>New here?</span>
                    <a th:href="@{/signup}" href="/signup" class="login-link-signup">Create an account</a>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
