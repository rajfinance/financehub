<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services | RajaFinanceHub</title>
</head>
<body>
<div th:replace="~{views/common/header :: header(true)}"></div>

<div class="public-page">
    <main class="public-page-card static-page" role="main">
        <h1 class="static-page-title">Services</h1>
        <p>RajaFinanceHub helps you manage professional income, expenses, rentals, and loans in one place.</p>
        <ul class="static-page-list static-page-list-bullets">
            <li>Expense tracking and category management</li>
            <li>Rental owners, payments, and reports</li>
            <li>Loan planning and summaries</li>
            <li>Professional experience and salary reporting</li>
        </ul>
        <div class="static-page-actions">
            <form th:action="@{/login}" method="get">
                <button type="submit" class="btn-services-signin">Sign in</button>
            </form>
        </div>
    </main>
</div>
</body>
</html>
