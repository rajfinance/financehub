<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div class="form-container form-container--wide">
    <th:block sec:authorize="isAuthenticated()">
        <h2>Record EMI</h2>

        <div th:if="${successMessage != null}" class="form-banner form-banner--success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage != null}" class="form-banner form-banner--error" th:text="${errorMessage}"></div>

        <p th:if="${loans == null or loans.isEmpty()}">No loans found.</p>

        <form th:if="${loans != null and !loans.isEmpty()}" id="recordEmiForm"
              th:action="@{/api/loan/recordEmi}" th:object="${emiPayment}" method="post"
              onsubmit="submitForm(event)">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" th:field="*{id}" th:if="${emiPayment.id != null}"/>

            <div class="form-row">
                <div class="form-column">
                    <div class="input-group">
                        <label for="loanId">Loan<span class="mandatory">*</span></label>
                        <select id="loanId" th:field="*{loanId}" required>
                            <option value="">Select loan</option>
                            <option th:each="loan : ${loans}"
                                    th:value="${loan.id}"
                                    th:text="${loan.bankName} + ' — ' + ${loan.loanAccountNumber}"
                                    th:selected="${emiPayment.loanId != null and emiPayment.loanId == loan.id}"></option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="emiNumber">EMI installment #<span class="mandatory">*</span></label>
                        <input type="number" id="emiNumber" th:field="*{emiNumber}" min="1" required />
                    </div>
                </div>
                <div class="form-column">
                    <div class="input-group">
                        <label for="emiAmount">EMI amount<span class="mandatory">*</span></label>
                        <input type="number" id="emiAmount" th:field="*{emiAmount}" min="0" step="0.01" required />
                    </div>
                    <div class="input-group">
                        <label for="paidOn">Deduction date<span class="mandatory">*</span></label>
                        <input type="date" id="paidOn" th:field="*{paidOn}" required />
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Save EMI</button>
        </form>
    </th:block>
</div>
</body>
</html>
