<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div class="form-container form-container--wide">
    <th:block sec:authorize="isAuthenticated()">
        <h2>Add Loan</h2>
        <div th:if="${successMessage != null}" class="form-banner form-banner--success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage != null}" class="form-banner form-banner--error" th:text="${errorMessage}"></div>

        <form id="addLoanForm" th:action="@{/api/loan/addLoan}" th:object="${loan}" method="post" th:onsubmit="submitForm(event)">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-row">
                <div class="form-column">
                    <div class="input-group">
                        <label for="loanAccountNumber">Loan Account Number:<span class="mandatory">*</span></label>
                        <input type="text" id="loanAccountNumber" th:field="*{loanAccountNumber}" maxlength="30" required />
                    </div>
                    <div class="input-group">
                        <label for="bankName">Bank Name:<span class="mandatory">*</span></label>
                        <select id="bankName" th:field="*{bankName}" required>
                            <option value="" selected>Select Bank</option>
                            <option th:each="bank : ${bankNames}" th:value="${bank}" th:text="${bank}"></option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="loanType">Loan Type:<span class="mandatory">*</span></label>
                        <select id="loanType" th:field="*{loanType}" required>
                            <option value="" selected>Select Loan Type</option>
                            <option th:each="type : ${loanTypes}" th:value="${type}" th:text="${type}"></option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="loanAmount">Sanctioned Loan Amount:<span class="mandatory">*</span></label>
                        <input type="number" id="loanAmount" th:field="*{loanAmount}" min="0" step="0.01" required />
                    </div>
                </div>

                <div class="form-column">
                    <div class="input-group">
                        <label for="tenure">Tenure (months):<span class="mandatory">*</span></label>
                        <input type="number" id="tenure" th:field="*{tenure}" min="1" required />
                    </div>
                    <div class="input-group">
                        <label for="interestRate">Interest Rate (%):</label>
                        <input type="number" step="0.01" id="interestRate" th:field="*{interestRate}" min="0" max="100" />
                    </div>
                    <div class="input-group">
                        <label for="emiAmount">Monthly EMI Amount:<span class="mandatory">*</span></label>
                        <input type="number" id="emiAmount" th:field="*{emiAmount}" min="0" step="0.01" required />
                    </div>
                    <div class="input-group">
                        <label for="emiDate">First EMI Date:<span class="mandatory">*</span></label>
                        <input type="date" id="emiDate" th:field="*{emiDate}" required />
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Add Loan</button>
        </form>
    </th:block>

    <th:block sec:authorize="!isAuthenticated()">
        <p>Please log in to access this page.</p>
    </th:block>
</div>
</body>
</html>
