<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div class="form-container form-container--wide">
    <th:block sec:authorize="isAuthenticated()">
        <h2>Loan Pre-Closure</h2>
        <div th:if="${successMessage != null}" class="form-banner form-banner--success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage != null}" class="form-banner form-banner--error" th:text="${errorMessage}"></div>

        <form id="preCloseLoanForm" th:action="@{/api/loan/preCloseLoan}" th:object="${preClosure}" method="post"
              th:onsubmit="submitForm(event)">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" th:field="*{loanId}"/>

            <div class="form-row">
                <div class="form-column">
                    <div class="input-group">
                        <label>Loan Account</label>
                        <input type="text" th:value="${loan.bankName} + ' — ' + ${loan.loanAccountNumber}" readonly />
                    </div>
                    <div class="input-group">
                        <label>EMI Amount</label>
                        <input type="text" th:value="${loan.formattedEmiAmount}" readonly />
                    </div>
                    <div class="input-group">
                        <label>Remaining EMI Count</label>
                        <input type="text" th:value="${remainingEmiCount}" readonly />
                    </div>
                </div>
                <div class="form-column">
                    <div class="input-group">
                        <label for="preClosureType">Pre-closure Type<span class="mandatory">*</span></label>
                        <select id="preClosureType" th:field="*{preClosureType}" onchange="toggleRecordEmiClosureType(this)" required>
                            <option value="FULL">Full</option>
                            <option value="PARTIAL">Partial</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="preClosureDate">Pre-closure Date<span class="mandatory">*</span></label>
                        <input type="date" id="preClosureDate" th:field="*{preClosureDate}" required />
                    </div>
                    <div class="input-group">
                        <label for="settlementAmount">Settlement Amount<span class="mandatory">*</span></label>
                        <input type="number" id="settlementAmount" th:field="*{settlementAmount}" min="0" step="0.01" required />
                    </div>
                    <div class="input-group">
                        <label for="referenceNumber">NOC / Foreclosure Number<span class="mandatory">*</span></label>
                        <input type="text" id="referenceNumber" th:field="*{referenceNumber}" maxlength="80" required />
                    </div>
                    <div id="partialClosureSection"
                         th:style="${preClosure.preClosureType == 'PARTIAL'} ? 'display:block;' : 'display:none;'">
                        <div class="input-group">
                            <label for="updatedEmiAmount">Updated EMI Amount<span class="mandatory">*</span></label>
                            <input type="number" id="updatedEmiAmount" th:field="*{updatedEmiAmount}" min="0" step="0.01" />
                        </div>
                        <div class="input-group">
                            <label for="updatedTenure">Updated Tenure (months)<span class="mandatory">*</span></label>
                            <input type="number" id="updatedTenure" th:field="*{updatedTenure}" min="1" />
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Projected Remaining Pending</label>
                        <input type="text" th:value="${remainingPendingAmount}" readonly />
                    </div>
                </div>
            </div>

            <div class="button-group fh-btn-group">
                <button type="submit" class="btn btn-primary">Save Pre-Closure</button>
                <button type="button" class="btn btn-secondary"
                        th:onclick="'loadContent(\'/api/loan/reports\')'">
                    Cancel
                </button>
            </div>
        </form>
    </th:block>
</div>
</body>
</html>
