<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div id="reportContent" class="emi-schedule-report-content">
    <h1 class="h1report">EMI Schedule</h1>

    <div class="form-row form-row--3" style="margin-bottom: 1rem;">
        <div class="input-group">
            <label for="emiScheduleLoan">Loan</label>
            <select id="emiScheduleLoan" onchange="reloadLoanEmiReport()">
                <option value="" th:selected="${selectedLoanId == null}">All loans</option>
                <option th:each="loan : ${loans}"
                        th:value="${loan.id}"
                        th:text="|${loan.bankName} — ${loan.loanAccountNumber}|"
                        th:selected="${selectedLoanId != null and selectedLoanId == loan.id}"></option>
            </select>
        </div>
        <div class="input-group">
            <label for="emiScheduleYear">Year</label>
            <select id="emiScheduleYear" onchange="reloadLoanEmiReport()">
                <option value="all" th:if="${allowAllYears}" th:selected="${selectedYear == null}">All</option>
                <option th:each="y : ${years}" th:value="${y}" th:text="${y}"
                        th:selected="${y == selectedYear}"></option>
            </select>
        </div>
    </div>

    <th:block th:if="${scheduleGroups != null and !scheduleGroups.isEmpty()}">
        <th:block th:each="group : ${scheduleGroups}">
            <h2 class="fh-report-section-title"
                th:text="|${group.loan.bankName} — ${group.loan.loanAccountNumber} (${group.loan.loanType})|"></h2>
            <table>
                <thead>
                <tr>
                    <th>#</th>
                    <th>Due Date</th>
                    <th>Deduction Date</th>
                    <th>EMI Amount</th>
                    <th>EMI Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="row : ${group.scheduleRows}">
                    <td th:text="${row.emiNumber}"></td>
                    <td th:text="${row.formattedDueDate}"></td>
                    <td th:text="${row.formattedDeductionDate}"></td>
                    <td class="fh-amount-col" th:text="${row.formattedEmiAmount}"></td>
                    <td class="fh-emi-status-cell">
                        <th:block th:if="${row.emiStatus == 'Pending'}">
                            <a class="fh-emi-pending-action" href="javascript:void(0);"
                               th:if="${row.recorded}"
                               th:onclick="|loadEditPageContent('/api/loan/recordEmi?id=${row.overrideId}')|"
                               title="Update recorded EMI">
                                <span class="fh-emi-pending-action__icon" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/>
                                    </svg>
                                </span>
                                <span>Pending — tap to update</span>
                            </a>
                            <a class="fh-emi-pending-action" href="javascript:void(0);"
                               th:unless="${row.recorded}"
                               th:onclick="|loadEditPageContent('/api/loan/recordEmi?loanId=${group.loan.id}&emiNumber=${row.emiNumber}')|"
                               title="Record this EMI payment">
                                <span class="fh-emi-pending-action__icon" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/>
                                    </svg>
                                </span>
                                <span>Pending — tap to record</span>
                            </a>
                            <a th:if="${row.recorded}" class="fh-emi-revert-link" href="javascript:void(0);"
                               th:onclick="'deleteEntity(this, \'EMI payment\', \'/api/loan/deleteEmiPayment\')'"
                               th:attr="data-report-type='loanEmiReport', data-id=${row.overrideId}"
                               title="Remove recorded EMI">
                                Revert
                            </a>
                        </th:block>
                        <span th:unless="${row.emiStatus == 'Pending'}" class="fh-status-badge"
                              th:classappend="${row.emiStatus == 'Pre-Closure'} ? ' fh-status-preclosure' : ' fh-status-completed'"
                              th:text="${row.emiStatus}"></span>
                    </td>
                </tr>
                </tbody>
            </table>
            <br/>
        </th:block>
        <h2 class="fh-report-summary-line">
            <span th:text="|Total EMI for ${selectedYearLabel}: ${yearTotal}|"></span>
            <span>&nbsp;|&nbsp;</span>
            <span th:text="|Pending Amount for ${selectedYearLabel}: ${yearPendingTotal}|"></span>
        </h2>
    </th:block>

    <p th:if="${scheduleGroups == null or scheduleGroups.isEmpty()}"
       style="text-align: center; color: var(--fh-text-muted); font-style: italic;">
        <span th:text="|No EMI entries for ${selectedYearLabel}. Add a loan or choose another year.|"></span>
    </p>
</div>
</body>
</html>
