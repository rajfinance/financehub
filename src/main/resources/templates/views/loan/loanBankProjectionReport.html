<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div id="reportContent" class="loan-projection-report-content">
    <h1 class="h1report">Bank EMI Projection</h1>

    <th:block th:if="${projectionReport != null and projectionReport.rows != null and !projectionReport.rows.isEmpty()}">
        <div class="fh-projection-table-wrap">
        <table class="fh-projection-table">
            <thead>
            <tr>
                <th rowspan="2" class="fh-col-sno">S.No</th>
                <th rowspan="2" class="fh-col-date">Date</th>
                <th class="fh-amount-col fh-col-emi">AXIS EMI</th>
                <th class="fh-amount-col fh-col-emi">ICICI EMI</th>
                <th class="fh-amount-col fh-col-emi">HDFC EMI</th>
                <th rowspan="2" class="fh-amount-col fh-col-narrow">TOTAL</th>
                <th rowspan="2" class="fh-amount-col fh-col-narrow">AXIS PAY</th>
                <th rowspan="2" class="fh-amount-col fh-col-narrow">ICICI PAY</th>
                <th rowspan="2" class="fh-amount-col fh-col-narrow">HDFC PAY</th>
                <th rowspan="2" class="fh-amount-col fh-col-narrow">AXIS + HDFC</th>
                <th rowspan="2" class="fh-amount-col fh-col-narrow">TOTAL PAY</th>
            </tr>
            <tr>
                <th class="fh-amount-col fh-col-emi" th:text="${projectionReport.formattedAxisHeaderAmount}"></th>
                <th class="fh-amount-col fh-col-emi" th:text="${projectionReport.formattedIciciHeaderAmount}"></th>
                <th class="fh-amount-col fh-col-emi" th:text="${projectionReport.formattedHdfcHeaderAmount}"></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row, rowStat : ${projectionReport.rows}">
                <td class="fh-col-sno" th:text="${rowStat.count}"></td>
                <td class="fh-col-date" th:text="${row.date}"></td>
                <td class="fh-amount-col fh-col-emi" th:text="${row.formattedAxisAmount}"></td>
                <td class="fh-amount-col fh-col-emi" th:text="${row.formattedIciciAmount}"></td>
                <td class="fh-amount-col fh-col-emi" th:text="${row.formattedHdfcAmount}"></td>
                <td class="fh-amount-col fh-col-narrow" th:text="${row.formattedTotalAmount}"></td>
                <td class="fh-amount-col fh-col-narrow" th:text="${row.formattedAxisPayAmount}"></td>
                <td class="fh-amount-col fh-col-narrow" th:text="${row.formattedIciciPayAmount}"></td>
                <td class="fh-amount-col fh-col-narrow" th:text="${row.formattedHdfcPayAmount}"></td>
                <td class="fh-amount-col fh-col-narrow" th:text="${row.formattedAxisAndHdfcPayAmount}"></td>
                <td class="fh-amount-col fh-col-narrow"><strong th:text="${row.formattedTotalPayAmount}"></strong></td>
            </tr>
            </tbody>
        </table>
        </div>
    </th:block>

    <p th:if="${projectionReport == null or projectionReport.rows == null or projectionReport.rows.isEmpty()}"
       style="text-align: center; color: var(--fh-text-muted); font-style: italic;">
        No upcoming EMI schedule found for Axis, ICICI, or HDFC from next month.
    </p>
</div>
</body>
</html>
