<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div id="reportContent">
    <h1 class="h1report">Bank EMI Projection</h1>

    <th:block th:if="${projectionReport != null and projectionReport.rows != null and !projectionReport.rows.isEmpty()}">
        <table>
            <thead>
            <tr>
                <th>Date</th>
                <th th:text="|AXIS - ${#numbers.formatInteger(projectionReport.axisHeaderAmount, 0)}|"></th>
                <th th:text="|ICICI - ${#numbers.formatInteger(projectionReport.iciciHeaderAmount, 0)}|"></th>
                <th th:text="|HDFC - ${#numbers.formatInteger(projectionReport.hdfcHeaderAmount, 0)}|"></th>
                <th>TOTAL</th>
                <th>AXIS PAY</th>
                <th>ICICI PAY</th>
                <th>HDFC PAY</th>
                <th>AXIS + HDFC</th>
                <th>TOTAL PAY</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row : ${projectionReport.rows}">
                <td th:text="${row.date}"></td>
                <td th:text="${#numbers.formatInteger(row.axisAmount, 0)}"></td>
                <td th:text="${#numbers.formatInteger(row.iciciAmount, 0)}"></td>
                <td th:text="${#numbers.formatInteger(row.hdfcAmount, 0)}"></td>
                <td th:text="${#numbers.formatInteger(row.totalAmount, 0)}"></td>
                <td th:text="${#numbers.formatInteger(row.axisPayAmount, 0)}"></td>
                <td th:text="${#numbers.formatInteger(row.iciciPayAmount, 0)}"></td>
                <td th:text="${#numbers.formatInteger(row.hdfcPayAmount, 0)}"></td>
                <td th:text="${#numbers.formatInteger(row.axisAndHdfcPayAmount, 0)}"></td>
                <td th:text="${#numbers.formatInteger(row.totalPayAmount, 0)}"></td>
            </tr>
            <tr class="fh-report-footer-row" th:if="${projectionReport.totalRow != null}">
                <td><strong th:text="${projectionReport.totalRow.date}"></strong></td>
                <td><strong th:text="${#numbers.formatInteger(projectionReport.totalRow.axisAmount, 0)}"></strong></td>
                <td><strong th:text="${#numbers.formatInteger(projectionReport.totalRow.iciciAmount, 0)}"></strong></td>
                <td><strong th:text="${#numbers.formatInteger(projectionReport.totalRow.hdfcAmount, 0)}"></strong></td>
                <td><strong th:text="${#numbers.formatInteger(projectionReport.totalRow.totalAmount, 0)}"></strong></td>
                <td><strong th:text="${#numbers.formatInteger(projectionReport.totalRow.axisPayAmount, 0)}"></strong></td>
                <td><strong th:text="${#numbers.formatInteger(projectionReport.totalRow.iciciPayAmount, 0)}"></strong></td>
                <td><strong th:text="${#numbers.formatInteger(projectionReport.totalRow.hdfcPayAmount, 0)}"></strong></td>
                <td><strong th:text="${#numbers.formatInteger(projectionReport.totalRow.axisAndHdfcPayAmount, 0)}"></strong></td>
                <td><strong th:text="${#numbers.formatInteger(projectionReport.totalRow.totalPayAmount, 0)}"></strong></td>
            </tr>
            </tbody>
        </table>
    </th:block>

    <p th:if="${projectionReport == null or projectionReport.rows == null or projectionReport.rows.isEmpty()}"
       style="text-align: center; color: var(--fh-text-muted); font-style: italic;">
        No upcoming EMI schedule found for Axis, ICICI, or HDFC from next month.
    </p>
</div>
</body>
</html>
