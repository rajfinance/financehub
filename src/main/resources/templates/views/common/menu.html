<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:fragment="menuGuestNoBar"></th:block>

<nav th:fragment="menuAuthNavList" class="app-primary-nav" aria-label="Application menu">
    <ul class="menu-items app-topbar-menu">
        <li class="menu-item"><a th:href="@{/api/home}">Home</a></li>
        <li class="menu-item">
            <a href="#">Professional</a>
            <ul class="dropdown">
                <li><a href="javascript:void(0);" th:onclick="'loadContent(\'/api/work/addExperience?action=add\')'">Add Experience</a></li>
                <li><a href="javascript:void(0);" th:onclick="'loadContent(\'/api/work/addSalary?action=add\')'">Add Salary</a></li>
                <li><a href="javascript:void(0);" th:onclick="'loadContent(\'/api/work/workReport\')'">Reports</a></li>
            </ul>
        </li>
        <li class="menu-item">
            <a href="#">Expenses</a>
            <ul class="dropdown">
                <li><a href="javascript:void(0);" th:onclick="'loadContent(\'/api/expenses/categories\')'">Categories</a></li>
                <li><a href="javascript:void(0);" th:onclick="'loadContent(\'/api/expenses/add\')'">Add Expenses</a></li>
                <li><a href="javascript:void(0);" th:onclick="'loadContent(\'/api/expenses/yearWiseActualPlan\')'">Year Wise</a></li>
            </ul>
        </li>
        <li class="menu-item">
            <a href="#">Rentals</a>
            <ul class="dropdown">
                <li><a href="javascript:void(0);" th:onclick="'loadContent(\'/api/rent/owners/add\')'">Add Owner</a></li>
                <li><a href="javascript:void(0);" th:onclick="'loadContent(\'/api/rent/payments/add\')'">Add Rent</a></li>
                <li><a href="javascript:void(0);" th:onclick="'loadContent(\'/api/rent/reports\')'">Reports</a></li>
            </ul>
        </li>
        <li class="menu-item">
            <a href="#">Loans</a>
            <ul class="dropdown">
                <li><a href="javascript:void(0);" th:onclick="'loadContent(\'/api/loan/addLoan\')'">Add Loan</a></li>
            </ul>
        </li>
        <li class="menu-item">
            <a href="#">Profile</a>
            <ul class="dropdown">
                <li><a th:href="@{/account/change-password}" href="/account/change-password">Change password</a></li>
                <li><a th:href="@{/account/profile}" href="/account/profile">Update profile</a></li>
            </ul>
        </li>
        <li class="menu-item menu-item-logout">
            <form th:action="@{/api/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="menu-logout-btn" title="Sign out" aria-label="Sign out">
                    <img class="menu-logout-icon" th:src="@{/images/signout.svg}" src="/images/signout.svg" alt="" width="18" height="18" loading="lazy" decoding="async"/>
                </button>
            </form>
        </li>
    </ul>
</nav>

<th:block th:fragment="menuShellEmpty"></th:block>

<th:block th:fragment="appMainShell">
    <div class="main-content" id="mainContent">
        <div id="username" style="display: none;" sec:authentication="name"></div>
        <div id="page-content"></div>
    </div>
</th:block>

<th:block th:fragment="menuBarOnly"></th:block>
</body>
</html>
