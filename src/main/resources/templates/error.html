<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | RajaFinanceHub</title>
</head>
<body>
<div th:replace="~{views/common/header :: header(true)}"></div>

<main class="content">
    <h1>Oops! Something went wrong</h1>
    <p class="error-message" th:text="${message ?: error ?: 'An unexpected error occurred.'}"></p>
    <p><a th:href="@{/}">Back to home</a></p>
</main>
</body>
</html>
